<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — BRWSK01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=18">
</head>
<body>
  <div id="site-header"></div>

  <main class="section">
    <div class="container">
      <div class="section-header">
        <h1 id="pageTitle"></h1>
        <p id="pageSubtitle"></p>
      </div>
      <div class="category-pills" id="categoryPills"></div>
      <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=18"></script>
  <script src="assets/js/i18n.js?v=18"></script>
  <script src="assets/js/demo-data.js?v=18"></script>
  <script src="firebase/config.js?v=18"></script>
  <script src="assets/js/image-utils.js?v=18"></script>
  <script src="assets/js/ui.js?v=18"></script>
  <script src="assets/js/firebase-service.js?v=18"></script>
  <script src="assets/js/products.js?v=18"></script>
  <script src="assets/js/components.js?v=18"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("products");

      const params = new URLSearchParams(window.location.search);
      const categoryId = params.get("category");

      const categories = await FirebaseService.getCategories();

      if (!categoryId) {
        window.location.replace("index.html");
        return;
      }

      Products.renderCategoryPills(categories, document.getElementById("categoryPills"), categoryId);

      const cat = categories.find((c) => c.id === categoryId);
      document.getElementById("pageTitle").textContent = cat ? cat.name : I18N.t("products");
      document.getElementById("pageSubtitle").textContent = I18N.t("allProductsSub");

      UI.showLoader(document.getElementById("productGrid"));
      const products = await FirebaseService.getProducts({ categoryId });
      Products.renderGrid(products, document.getElementById("productGrid"));
    });
  </script>
</body>
</html>
